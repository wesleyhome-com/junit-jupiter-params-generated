name: Build Gradle project

on:
  push:
    branches:
      - 'main'
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-snapshot-gradle-project:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Run build with Gradle Wrapper
        run: ./gradlew build dokkaGenerate --no-daemon
      - name: Detect snapshot version
        id: version
        shell: bash
        run: |
          VERSION="$(grep '^version=' gradle.properties | cut -d'=' -f2)"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish SNAPSHOT artifacts to Maven Central
        if: steps.version.outputs.is_snapshot == 'true'
        run: ./gradlew publishProjectSnapshotsToMavenCentral --no-daemon
      - name: Checkout gh-pages (for versioned docs state)
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true
      - name: Build site artifact
        run: bash .github/scripts/build-pages-site.sh latest docs gh-pages site
      - name: Update documentation
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
